<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .left-sidebar {
            width: 220px;
            min-width: 220px;
            background: linear-gradient(180deg, #1a1f2e 0%, #252b3d 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .sidebar-header h2 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #fff;
        }

        .sidebar-header p {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
        }

        .nav-menu {
            flex: 1;
            padding: 15px 0;
            overflow-y: auto;
        }

        .nav-item {
            display: block;
            padding: 14px 20px;
            margin: 4px 12px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: none;
            background: none;
            width: calc(100% - 24px);
            text-align: left;
        }

        .nav-item:hover {
            background-color: rgba(255,255,255,0.08);
            color: #fff;
        }

        .nav-item.active {
            background-color: #409eff;
            color: #fff;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(64,158,255,0.35);
        }

        .nav-item .icon {
            display: inline-block;
            width: 20px;
            text-align: center;
            margin-right: 8px;
            font-size: 15px;
        }

        .settings-panel {
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background-color: rgba(0,0,0,0.2);
        }

        .settings-title {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .settings-title .icon {
            margin-right: 6px;
            font-size: 14px;
        }

        .setting-row {
            margin-bottom: 10px;
        }

        .setting-row label {
            display: block;
            font-size: 12px;
            color: rgba(255,255,255,0.55);
            margin-bottom: 4px;
        }

        .setting-row input {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            background-color: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .setting-row input:focus {
            border-color: #409eff;
        }

        .setting-row input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .btn-save {
            width: 100%;
            padding: 9px;
            background-color: #409eff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 500;
            margin-top: 5px;
        }

        .btn-save:hover {
            background-color: #66b1ff;
        }

        .save-msg {
            font-size: 11px;
            color: #67c23a;
            text-align: center;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .save-msg.show {
            opacity: 1;
        }

        .right-content {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: #f0f2f5;
        }

        .page-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #fff;
        }

        .page-frame.active {
            display: block;
        }
    </style>
</head>

<div id="pwd-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1f2e 0%,#252b3d 100%);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:'Helvetica Neue',Helvetica,'PingFang SC','Microsoft YaHei',Arial,sans-serif;">
    <div style="background:#fff;padding:40px 50px;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.3);text-align:center;min-width:320px;">
        <div style="font-size:48px;margin-bottom:10px;">&#128272;</div>
        <h2 style="margin:0 0 8px 0;color:#303133;font-size:20px;">综合管理平台</h2>
        <p style="margin:0 0 25px 0;color:#909399;font-size:14px;">请输入账号和密码</p>
        <input type="text" id="user-input" placeholder="访问账号" style="width:100%;padding:10px 12px;border:1px solid #dcdfe6;border-radius:4px;outline:none;font-size:14px;box-sizing:border-box;margin-bottom:12px;transition:border-color .2s;" onkeydown="if(event.key==='Enter')document.getElementById('pwd-input').focus()">
        <input type="password" id="pwd-input" placeholder="访问密码" style="width:100%;padding:10px 12px;border:1px solid #dcdfe6;border-radius:4px;outline:none;font-size:14px;box-sizing:border-box;margin-bottom:15px;transition:border-color .2s;" onkeydown="if(event.key==='Enter')checkLogin()">
        <button onclick="checkLogin()" style="width:100%;padding:10px 0;background:#409eff;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer;transition:background .2s;">进入系统</button>
        <p id="login-error" style="color:#f56c6c;font-size:13px;margin:10px 0 0 0;display:none;">账号或密码错误，请重试</p>
        <p style="color:#c0c4cc;font-size:12px;margin-top:15px;border-top:1px solid #ebeef5;padding-top:10px;">糜鹿成群，虎豹避之；飞鸟成列，鹰鹫不击</p>
    </div>
</div>

<script>
    function switchPage(index, btnElement) {
        document.querySelectorAll('.page-frame').forEach(function(f, i) {
            f.classList.toggle('active', i === index);
        });
        document.querySelectorAll('.nav-item').forEach(function(n) {
            n.classList.remove('active');
        });
        btnElement.classList.add('active');
        // 切换页面后广播最新设置
        setTimeout(function() { broadcastSettings(); }, 100);
    }

    function initSettings() {
        var tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(23, 59, 0, 0);
        var isoStr = new Date(tomorrow.getTime() - tomorrow.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
        document.getElementById('settingDeadline').value = isoStr;
        document.getElementById('settingTotal').value = '120';
        document.getElementById('settingUsed').value = '113';
    }

    function saveSettings() {
        var deadline = document.getElementById('settingDeadline').value;
        var total = document.getElementById('settingTotal').value;
        var used = document.getElementById('settingUsed').value;

        if (deadline) localStorage.setItem('sys_deadline', deadline);
        if (total) localStorage.setItem('sys_total', total);
        if (used) localStorage.setItem('sys_used', used);

        broadcastSettings();

        var msg = document.getElementById('saveMsg');
        msg.classList.add('show');
        setTimeout(function() {
            msg.classList.remove('show');
        }, 2000);
    }

    function broadcastSettings() {
        var settings = {
            deadline: localStorage.getItem('sys_deadline') || '',
            total: localStorage.getItem('sys_total') || '120',
            used: localStorage.getItem('sys_used') || '113'
        };

        document.querySelectorAll('.page-frame').forEach(function(frame) {
            try {
                frame.contentWindow.postMessage({
                    type: 'settingsUpdate',
                    data: settings
                }, '*');
            } catch(e) {}
        });
    }

    function loadSavedSettings() {
        var deadline = localStorage.getItem('sys_deadline');
        var total = localStorage.getItem('sys_total');
        var used = localStorage.getItem('sys_used');

        if (deadline) document.getElementById('settingDeadline').value = deadline;
        if (total) document.getElementById('settingTotal').value = total;
        if (used) document.getElementById('settingUsed').value = used;
    }

    window.onload = function() {
        loadSavedSettings();
        if (!localStorage.getItem('sys_deadline')) {
            initSettings();
        }
        // 页面加载后广播设置，确保 iframe 初始化时能收到
        setTimeout(function() { broadcastSettings(); }, 300);
    };
</script>

<script>
    // ========== 账号密码保护 ==========
    const CORRECT_USER     = "songguo";
    const CORRECT_PASSWORD = "@1#2￥3I";

    function checkLogin() {
        const user = document.getElementById('user-input').value.trim();
        const pwd  = document.getElementById('pwd-input').value;
        if (user === CORRECT_USER && pwd === CORRECT_PASSWORD) {
            document.getElementById('pwd-overlay').style.display = 'none';
            document.getElementById('app-content').style.display  = 'block';
            document.getElementById('login-error').style.display  = 'none';
        } else {
            document.getElementById('login-error').style.display = 'block';
            document.getElementById('pwd-input').value = '';
            document.getElementById('pwd-input').focus();
        }
    }
    window.addEventListener('load', function() {
        setTimeout(function(){ var ui = document.getElementById('user-input'); if(ui) ui.focus(); }, 100);
    });
    // ================================
</script>
<script>
    // ========== 网页保护：禁用保存/打印/查看源码/开发者工具 ==========
    (function() {
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        window.addEventListener('keydown', function(e) {
            var k = e.key.toLowerCase();
            if ((e.ctrlKey || e.metaKey) && k === 's') { e.preventDefault(); e.stopPropagation(); return false; }
            if ((e.ctrlKey || e.metaKey) && k === 'p') { e.preventDefault(); e.stopPropagation(); return false; }
            if ((e.ctrlKey || e.metaKey) && k === 'u') { e.preventDefault(); return false; }
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && k === 'i')) { e.preventDefault(); return false; }
        }, true);
        document.addEventListener('dragstart', function(e) { if(e.target.tagName==='IMG'){e.preventDefault();return false;} });
        window.addEventListener('beforeprint', function(e) { e.preventDefault(); return false; });
    })();
    // ===========================================================
</script>
</body>
</html>
